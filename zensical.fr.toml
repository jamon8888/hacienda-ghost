[project]
site_name = "PIIGhost"
site_url = "https://athroniaeth.github.io/piighost/fr/"
site_description = "Couche d'anonymisation PII pour agents LLM, basée sur GLiNER2"
site_author = "PIIGhost"
copyright = "Copyright &copy; 2026 contributeurs PIIGhost"
repo_url = "https://github.com/Athroniaeth/piighost"
repo_name = "Athroniaeth/piighost"
edit_uri = "edit/master/docs/fr/"
docs_dir = "docs/fr"
site_dir = "site/fr"
extra_css = ["stylesheets/extra.css"]

nav = [
  { "Accueil" = "index.md" },
  { "Démarrer" = [
    { "Démarrage rapide" = "getting-started.md" },
    { "Usage basique" = "examples/basic.md" },
  ]},
  { "Usage" = [
    { "Intégration LangChain" = "examples/langchain.md" },
    { "Détecteurs prêts à l'emploi" = "examples/detectors.md" },
    { "Étendre PIIGhost" = "extending.md" },
    { "Tests" = "examples/testing.md" },
    { "Déploiement" = "deployment.md" },
  ]},
  { "Référence" = [
    { "Anonymizer" = "reference/anonymizer.md" },
    { "Pipeline" = "reference/pipeline.md" },
    { "Middleware" = "reference/middleware.md" },
    { "Détecteurs" = "reference/detectors.md" },
  ]},
  { "Concepts" = [
    { "Architecture" = "architecture.md" },
    { "Glossaire" = "glossary.md" },
    { "Limites" = "limitations.md" },
    { "Sécurité" = "security.md" },
  ]},
  { "Communauté" = [
    { "Contribuer" = "community/contributing.md" },
    { "Code de conduite" = "community/code-of-conduct.md" },
    { "Signaler un bug" = "community/bug-reports.md" },
    { "FAQ" = "community/faq.md" },
  ]},
]

[project.theme]
language = "fr"
icon.logo = "lucide/ghost"
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "header.autohide",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.follow",
]

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.critic]
[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.tilde]

[project.markdown_extensions.pymdownx.snippets]
base_path = ["docs/fr"]
auto_append = ["includes/abbreviations.md"]

[project.markdown_extensions.pymdownx.superfences]
[[project.markdown_extensions.pymdownx.superfences.custom_fences]]
name = "mermaid"
class = "mermaid"
format = "pymdownx.superfences.fence_code_format"

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Passer en mode sombre"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Passer en mode clair"

[project.extra.tags]
LangChain = "langchain"
Middleware = "middleware"
"Détecteur" = "detecteur"
Regex = "regex"
"Avancé" = "avance"
Tests = "tests"

[project.theme.icon.tag]
default = "lucide/hash"
langchain = "lucide/link"
middleware = "lucide/blend"
detecteur = "lucide/scan-search"
regex = "lucide/regex"
avance = "lucide/rocket"
tests = "lucide/flask-conical"

[[project.extra.alternate]]
name = "English"
link = "/piighost/"
lang = "en"

[[project.extra.alternate]]
name = "Français"
link = "/piighost/fr/"
lang = "fr"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/Athroniaeth/piighost"
name = "PIIGhost sur GitHub"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/piighost/"
name = "PIIGhost sur PyPI"
