[project]
site_name = "PIIGhost"
site_description = "Couche d'anonymisation PII pour agents LLM, basée sur GLiNER2"
site_author = "PIIGhost"
docs_dir = "docs/fr"
site_dir = "site/fr"

nav = [
  { "Accueil" = "index.md" },
  { "Démarrage rapide" = "getting-started.md" },
  { "Architecture" = "architecture.md" },
  { "Exemples" = [
    { "Usage basique" = "examples/basic.md" },
    { "Intégration LangChain" = "examples/langchain.md" },
    { "Utiliser les détecteurs prêts à l'emploi" = "examples/detectors.md" },
    { "Tester sans GLiNER2" = "examples/testing.md" },
  ]},
  { "Étendre PIIGhost" = "extending.md" },
  { "Déploiement" = "deployment.md" },
  { "Référence API" = [
    { "Anonymizer" = "reference/anonymizer.md" },
    { "Pipeline" = "reference/pipeline.md" },
    { "Middleware" = "reference/middleware.md" },
    { "Détecteurs prêts à l'emploi" = "reference/detectors.md" },
  ]},
]

[project.theme]
language = "fr"
features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Passer en mode sombre"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Passer en mode clair"

[[project.extra.alternate]]
name = "English"
link = "/piighost/"
lang = "en"

[[project.extra.alternate]]
name = "Français"
link = "/piighost/fr/"
lang = "fr"
