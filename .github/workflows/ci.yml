name: CI

on:
  workflow_call:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint / Format / Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-3.13-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-3.13-
      # Sync full workspace (3.13 required by examples/graph) for lint
      - run: uv sync --locked --dev --no-progress -q
      - run: make lint

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ matrix.python-version }}-
      # Install the optional extras the test suite actually exercises:
      #   - index: kreuzberg (document extraction), lancedb, rank-bm25
      #   - haystack: haystack-ai (integration tests)
      #   - mcp: fastmcp (MCP server unit tests)
      # Without these, ~30 tests fail with ModuleNotFoundError /
      # RuntimeError in `svc.index_path()` rather than exercising real
      # product behaviour. Local pre-push runs with these installed.
      - run: uv sync --locked --dev --group pipeline --group langchain --group faker --extra index --extra haystack --extra mcp --no-progress -q
      - run: uv run pytest
