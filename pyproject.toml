[project]
name = "aegra"
version = "0.1.0"
description = "aegra"
requires-python = ">=3.12"

dependencies = [
    "aegra-cli>=0.7.4",
    "langgraph>=1.0.8",
    "langchain>=0.3.14",
    "langchain-openai>=0.3.0",
    "langchain-anthropic>=0.3.12",
    "keyshield[argon2,fastapi]>=2.0.0",
    "aiosqlite>=0.22.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aegra"]

[dependency-groups]
dev = [
    "commitizen>=4.13.9",
    "pyrefly>=0.55.0",
    "ruff>=0.15.5",
]
