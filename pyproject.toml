[project]
name = "piighost"
version = "0.8.0"
description = "PII anonymization middleware for AI agent conversations using LangChain integration."
readme = "README.md"
license = { text = "MIT" }
authors = [
    { name = "Athroniaeth" },
]
keywords = [
    "pii",
    "anonymization",
    "nlp",
    "ner",
    "langchain",
    "langgraph",
    "gliner",
    "privacy",
    "ai",
    "agents",
]
classifiers = [
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Security",
    "Topic :: Text Processing :: Linguistic",
    "Typing :: Typed",
]
requires-python = ">=3.10"
dependencies = [
    "typer>=0.12",
    "rich>=13.7",
    "pydantic>=2.7",
    "tomli; python_version < '3.11'",
    "tomli-w>=1.0",
    "psutil>=5.9",
    "portalocker>=2.8",
    "httpx>=0.27",
    "starlette>=0.37",
    "uvicorn>=0.30",
]

[project.scripts]
piighost = "piighost.cli.main:app"

[project.urls]
Homepage = "https://github.com/Athroniaeth/piighost"
Documentation = "https://github.com/Athroniaeth/piighost#readme"
Issues = "https://github.com/Athroniaeth/piighost/issues"
Changelog = "https://github.com/Athroniaeth/piighost/blob/master/CHANGELOG.md"

[project.optional-dependencies]
docker = [
    "httpx>=0.28",
    "pyyaml>=6",
]
gliner2 = [
    "gliner2>=1.2",
]
langchain = [
    "langchain>=1.2",
]
faker = [
    "faker>=40.11",
]
cache = [
    "aiocache>=0.12",
]
middleware = [
    "langchain>=1.2",
    "aiocache>=0.12",
]
client = [
    "httpx>=0.28",
]
spacy = [
    "spacy>=3.7",
]
transformers = [
    "transformers>=4.40",
    "torch>=2.0",
]
llm = [
    "langchain-core>=0.3",
]
haystack = [
    "haystack-ai>=2.8",
    "aiocache>=0.12",
]
haystack-lancedb = [
    "piighost[haystack]",
    "lancedb-haystack>=0.1",
]
haystack-embeddings-local = [
    "piighost[haystack]",
    "sentence-transformers>=3.3",
]
haystack-embeddings-mistral = [
    "piighost[haystack]",
    "mistral-haystack>=0.1",
]
index = [
    "kreuzberg>=0.5",
    "lancedb>=0.15",
    "rank-bm25>=0.2.2",
    "sentence-transformers>=3.3",
]
mcp = [
    "fastmcp>=2.0",
]
langchain-lancedb = [
    "piighost[langchain]",
    "langchain-community>=0.3",
    "lancedb>=0.15",
]
langchain-kreuzberg = [
    "piighost[langchain]",
    "langchain-kreuzberg>=0.1",
]
langchain-embeddings-local = [
    "piighost[langchain]",
    "langchain-huggingface>=0.2",
    "sentence-transformers>=3.3",
]
langchain-embeddings-mistral = [
    "piighost[langchain]",
    "langchain-mistralai>=0.2",
]
all = [
    "piighost[gliner2,langchain,faker,cache,client,spacy,transformers,llm,haystack,index,mcp]",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/piighost"]

[dependency-groups]
dev = [
    "ruff>=0.15.5",
    "pytest>=9.0.2",
    "pytest-cov>=6.0",
    "pyrefly>=0.55.0",
    "zensical>=0.0.27",
    "commitizen>=4.13.9",
    "pytest-asyncio>=0.25",
]
faker = [
    "faker>=40.11.0",
]
gliner2 = [
    "gliner2>=1.2.4",
]
langchain = [
    "langchain>=1.2.13",
]
spacy = [
    "spacy>=3.7",
]
transformers = [
    "transformers>=4.40",
    "torch>=2.0",
]
pipeline = [
    "aiocache>=0.12.3",
]
llm = [
    "langchain-core>=0.3",
]

[tool.pytest.ini_options]
addopts = "--cov=src/piighost"
markers = [
    "slow: tests that require optional heavy backends (LanceDB, real GLiNER2)",
]

[tool.coverage.report]
show_missing = true
