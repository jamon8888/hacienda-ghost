[project]
name = "maskara"
version = "0.1.0"
description = "Maskara is a tool for anonymizing sensitive data in text using AI models."
requires-python = ">=3.12"

dependencies = [
    "gliner2>=1.2",
    "faker>=40.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/maskara"]

[tool.uv.workspace]
members = [
    "examples/graph",
]

[dependency-groups]
dev = [
    "ruff>=0.15.5",
    "pytest>=9.0.2",
    "pyrefly>=0.55.0",
    "zensical>=0.0.27",
    "commitizen>=4.13.9",
]
