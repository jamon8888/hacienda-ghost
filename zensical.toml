[project]
site_name = "PIIGhost"
site_url = "https://athroniaeth.github.io/piighost/"
site_description = "PII anonymization layer for LLM agents, with a built-in LangChain middleware"
site_author = "PIIGhost"
copyright = "Copyright &copy; 2026 PIIGhost contributors"
repo_url = "https://github.com/Athroniaeth/piighost"
repo_name = "Athroniaeth/piighost"
edit_uri = "edit/master/docs/en/"
docs_dir = "docs/en"
extra_css = ["stylesheets/extra.css"]

nav = [
  { "Home" = "index.md" },
  { "Get started" = [
    { "Installation" = "getting-started/installation.md" },
    { "Quickstart" = "getting-started/quickstart.md" },
    { "First pipeline" = "getting-started/first-pipeline.md" },
    { "Conversational pipeline" = "getting-started/conversation.md" },
    { "LangChain middleware" = "getting-started/langchain.md" },
    { "Remote client" = "getting-started/api-client.md" },
    { "Basic usage" = "examples/basic.md" },
  ]},
  { "Usage" = [
    { "LangChain integration" = "examples/langchain.md" },
    { "Pre-built detectors" = "examples/detectors.md" },
    { "Extending PIIGhost" = "extending.md" },
    { "Testing" = "examples/testing.md" },
    { "Deployment" = "deployment.md" },
  ]},
  { "Reference" = [
    { "Anonymizer" = "reference/anonymizer.md" },
    { "Pipeline" = "reference/pipeline.md" },
    { "Middleware" = "reference/middleware.md" },
    { "Detectors" = "reference/detectors.md" },
  ]},
  { "Concepts" = [
    { "Why anonymize?" = "why-anonymize.md" },
    { "Architecture" = "architecture.md" },
    { "Placeholder factories" = "placeholder-factories.md" },
    { "Tool-call strategies" = "tool-call-strategies.md" },
    { "Glossary" = "glossary.md" },
    { "Limitations" = "limitations.md" },
    { "Security" = "security.md" },
  ]},
  { "Community" = [
    { "Contributing" = "community/contributing.md" },
    { "Code of conduct" = "community/code-of-conduct.md" },
    { "Bug reports" = "community/bug-reports.md" },
    { "FAQ" = "community/faq.md" },
  ]},
]

[project.theme]
language = "en"
icon.logo = "lucide/ghost"
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "header.autohide",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.critic]
[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.tilde]

[project.markdown_extensions.pymdownx.snippets]
base_path = ["docs/en"]
auto_append = ["includes/abbreviations.md"]

[project.markdown_extensions.pymdownx.superfences]
[[project.markdown_extensions.pymdownx.superfences.custom_fences]]
name = "mermaid"
class = "mermaid"
format = "pymdownx.superfences.fence_code_format"

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[[project.extra.alternate]]
name = "English"
link = "/piighost/"
lang = "en"

[[project.extra.alternate]]
name = "Français"
link = "/piighost/fr/"
lang = "fr"

[project.extra.tags]
LangChain = "langchain"
Middleware = "middleware"
Detector = "detector"
Regex = "regex"
Advanced = "advanced"
Testing = "testing"

[project.theme.icon.tag]
default = "lucide/hash"
langchain = "lucide/link"
middleware = "lucide/blend"
detector = "lucide/scan-search"
regex = "lucide/regex"
advanced = "lucide/rocket"
testing = "lucide/flask-conical"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/Athroniaeth/piighost"
name = "PIIGhost on GitHub"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/piighost/"
name = "PIIGhost on PyPI"
