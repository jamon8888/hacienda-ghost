[project]
site_name = "PIIGhost"
site_description = "PII anonymization layer for LLM agents, powered by GLiNER2"
site_author = "PIIGhost"
docs_dir = "docs/en"

nav = [
  { "Home" = "index.md" },
  { "Getting started" = "getting-started.md" },
  { "Glossary" = "glossary.md" },
  { "Architecture" = "architecture.md" },
  { "Limitations" = "limitations.md" },
  { "Security" = "security.md" },
  { "Examples" = [
    { "Basic usage" = "examples/basic.md" },
    { "LangChain integration" = "examples/langchain.md" },
    { "Pre-built detectors usage" = "examples/detectors.md" },
    { "Testing" = "examples/testing.md" },
  ]},
  { "Extending PIIGhost" = "extending.md" },
  { "Deployment" = "deployment.md" },
  { "API Reference" = [
    { "Anonymizer" = "reference/anonymizer.md" },
    { "Pipeline" = "reference/pipeline.md" },
    { "Middleware" = "reference/middleware.md" },
    { "Pre-built detectors" = "reference/detectors.md" },
  ]},
]

[project.theme]
language = "en"
features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.alternate]]
name = "English"
link = "/piighost/"
lang = "en"

[[project.extra.alternate]]
name = "Français"
link = "/piighost/fr/"
lang = "fr"
